# =====================================================
# zMItemsBuilder - Language File (ES)
# =====================================================
#
# This file contains all translatable messages used by the plugin.
# You can fully customize texts, colors and formats.
#
# -----------------------------------------------------
# FORMAT & COLOR SUPPORT
# -----------------------------------------------------
# - Supports Minecraft color codes using "&" (e.g. &a, &c, &7)
# - Supports HEX colors: &#RRGGBB
# - Supports MiniMessage formatting:
#   <gradient>, <bold>, <click>, <hover>, etc.
#
# Example:
#   <gradient:#F13713:#C14C36>Text</gradient>

messages:
  prefix: '<b><gradient:#F13713:#C14C36:#F13713>zMItemsBuilder</gradient></b> &8| &r'
  success: "&aKit &f{kit} &adelivered. Items: &f{count}&a, dropped: &f{dropped}&a."
  no-permission: "&cYou do not have permission."
  kit-not-found: "&cKit &f{kit} &cdoes not exist."
  reloaded: "&aConfiguration reloaded successfully."
  usage: "&eUsage: /zmitems <create|reload|material|info>"
  usage-create: "&eUsage: /zmitems create <kit> <prefix>"
  usage-material: "&eUsage: /zmitems material <material>"
  player-only: "&cOnly a player can run this command."
  invalid-hex-prefix: "&cYou must include a valid hex color. Example: &f/zmitems create especial (COLOR RGB HEXADECIMAL)"
  invalid-material: "&cInvalid material: &f{material}"
  no-item-in-hand: "&cYou are not holding any item."
  material-updated: "&aMaterial changed to &f{material}&a."
  info-header: "&eHeld item info:"
  info-material: "&7- Material: &f{material}"
  info-id: "&7- ID: &f{id}"
  info-cmd: "&7- CustomModelData: &f{cmd}"
  info-none: "&eThis item has no id or custom model data. &7(Material: &f{material}&7)"
  update-title: "<bold><green>Update available</green></bold>"
  update-subtitle: "&7Current: &f{current_version} &8| &7Latest: &a{latest_version}"
  update-available: "&eA new version is available: &f{latest_version}"
  update-link: "&7Open the version page: &b<click:open_url:'{version_url}'><u>{version_url}</u></click>"
  blocked-place: "&cThis item cannot be placed."
  blocked-craft: "&cThis item cannot be used for crafting."
  blocked-drop: "&cThis item cannot be dropped."
  blocked-use: "&cThis item cannot be used."
  blocked-consume: "&cThis item cannot be consumed."
  blocked-equip: "&cThis item cannot be equipped."
  blocked-anvil: "&cThis item cannot be used in an anvil."
  blocked-smithing: "&cThis item cannot be used in a smithing table."
  blocked-grindstone: "&cThis item cannot be used in a grindstone."
  blocked-enchant: "&cThis item cannot be enchanted."
  blocked-brewing: "&cThis item cannot be used in a brewing stand."
  blocked-furnace: "&cThis item cannot be used in furnaces."

