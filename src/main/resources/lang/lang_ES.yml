# =====================================================
# zMItemsBuilder - Archivo de idioma (ES)
# =====================================================
#
# Este archivo contiene todos los mensajes traducibles del plugin.
# Puedes personalizar completamente los textos, colores y formatos.
#
# -----------------------------------------------------
# FORMATO Y COLORES
# -----------------------------------------------------
# - Soporta códigos de color de Minecraft usando "&" (ej: &a, &c, &7)
# - Soporta colores HEX: &#RRGGBB
# - Soporta formato MiniMessage:
#   <gradient>, <bold>, <click>, <hover>, etc.
#
# Ejemplo:
#   <gradient:#F13713:#C14C36>Texto</gradient>

messages:
  prefix: '<b><gradient:#F13713:#C14C36:#F13713>zMItemsBuilder</gradient></b> &8| &r'
  success: "&aKit &f{kit} &aentregado correctamente. Objetos: &f{count}&a, soltados: &f{dropped}&a."
  no-permission: "&cNo tienes permiso para hacer esto."
  kit-not-found: "&cEl kit &f{kit} &cno existe."
  reloaded: "&aConfiguración recargada correctamente."
  usage: "&eUso: /zmitems <create|reload|material|info>"
  usage-create: "&eUso: /zmitems create <kit> <prefijo>"
  usage-material: "&eUso: /zmitems material <material>"
  player-only: "&cSolo un jugador puede ejecutar este comando."
  invalid-hex-prefix: "&cDebes incluir un color hex valido. Ejemplo: &f/zmitems create especial (COLOR RGB HEXADECIMAL)"
  invalid-material: "&cMaterial inválido: &f{material}"
  no-item-in-hand: "&cNo tienes ningún item en la mano."
  material-updated: "&aMaterial cambiado a &f{material}&a."
  info-header: "&eInformación del item en mano:"
  info-material: "&7- Material: &f{material}"
  info-id: "&7- ID: &f{id}"
  info-cmd: "&7- CustomModelData: &f{cmd}"
  info-none: "&eEste item no tiene id ni custom model data. &7(Material: &f{material}&7)"
  update-title: "<bold><green>Hay una actualización</green></bold>"
  update-subtitle: "&7Actual: &f{current_version} &8| &7Nueva: &a{latest_version}"
  update-available: "&eHay una nueva versión disponible: &f{latest_version}"
  update-link: "&7Abre la página de versión: &b<click:open_url:'{version_url}'><u>{version_url}</u></click>"
  blocked-place: "&cEste item no se puede colocar."
  blocked-craft: "&cEste item no se puede usar para craftear."
  blocked-drop: "&cEste item no se puede tirar."
  blocked-use: "&cEste item no se puede usar."
  blocked-consume: "&cEste item no se puede consumir."
  blocked-equip: "&cEste item no se puede equipar."
  blocked-anvil: "&cEste item no se puede usar en yunque."
  blocked-smithing: "&cEste item no se puede usar en la forja."
  blocked-grindstone: "&cEste item no se puede usar en la piedra de afilar."
  blocked-enchant: "&cEste item no se puede encantar."
  blocked-brewing: "&cEste item no se puede usar en un soporte de pociones."
  blocked-furnace: "&cEste item no se puede usar en hornos."

